<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>beetDeck</title>
        <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <header>
            <h1 onclick="navigate('')">
                <img src="/static/logo.svg" alt="" />beetDeck
            </h1>
            <div class="header-actions">
                <div class="search-box">
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search…"
                        oninput="onSearchInput(this.value)"
                        onkeydown="
                            if (event.key === 'Escape') {
                                clearSearch();
                            }
                        "
                    />
                    <button
                        class="search-clear"
                        id="search-clear"
                        onclick="clearSearch()"
                    >
                        ×
                    </button>
                </div>
                <button
                    class="btn"
                    id="rescan-quick"
                    onclick="doRescan('quick')"
                >
                    Quick Scan
                </button>
                <button class="btn" id="rescan-full" onclick="doRescan('full')">
                    Full Scan
                </button>
                <button
                    class="theme-toggle"
                    id="theme-toggle"
                    onclick="cycleTheme()"
                    title="Theme"
                ></button>
            </div>
        </header>
        <div id="scan-results" style="display: none"></div>
        <main>
            <div id="app"><div class="loading">Loading…</div></div>
        </main>
        <script src="/static/js/utils.js"></script>
        <script src="/static/js/theme.js"></script>
        <script src="/static/js/filter.js"></script>
        <script src="/static/js/routing.js"></script>
        <script src="/static/js/library.js"></script>
        <script src="/static/js/search.js"></script>
        <script src="/static/js/artist.js"></script>
        <script src="/static/js/album.js"></script>
        <script src="/static/js/identify.js"></script>
        <script src="/static/js/scan.js"></script>
        <script src="/static/js/genres.js"></script>
        <script src="/static/js/cover.js"></script>
        <script src="/static/js/lyrics.js"></script>
        <script>
            /* ---- Init ---- */
            route();
        </script>
    </body>
</html>
